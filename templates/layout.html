{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}LeeCode{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #0e8074;
      --accent-deep: #0a5f56;
      --accent-soft: #dcefec;
      --ink: #221f1a;
      --ink-soft: #7c756b;
      --paper: #f6f5f1;
      --card-border: #e7e4dd;
      --blue: #4173b4;   --blue-soft: #e8eef7;
      --green: #35895a;  --green-soft: #e4f2e9;
      --rose: #c14e5c;   --rose-soft: #faeaec;
      --amber: #9a6c14;  --amber-soft: #f9f0da;
      --violet: #7257b8; --violet-soft: #eee9f9;
      --display: "Bricolage Grotesque", "Inter", sans-serif;
      --mono: "JetBrains Mono", monospace;
    }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background:
        radial-gradient(900px 320px at 75% -140px, rgba(14, 128, 116, 0.12), transparent 70%),
        radial-gradient(700px 280px at 10% -160px, rgba(154, 108, 20, 0.07), transparent 70%),
        var(--paper);
      background-attachment: fixed;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); }
    /* No animation/transform on <main>: it would create a stacking context or
       containing block and break the position:fixed modals nested inside it. */
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none !important; transition: none !important; }
    }

    .navbar {
      background: linear-gradient(120deg, #143d38 0%, #0d6c60 100%);
      padding-top: 0.7rem; padding-bottom: 0.7rem;
    }
    .navbar-brand {
      font-family: var(--display);
      font-weight: 800; font-size: 1.25rem;
      color: #fff; letter-spacing: -0.02em;
    }
    .navbar-brand .dot { color: #f3b73c; }
    .navbar .nav-link {
      color: rgba(255, 255, 255, 0.72);
      font-weight: 500; font-size: 0.92rem;
      border-radius: 0.5rem;
      padding: 0.35rem 0.8rem !important;
      margin-left: 0.15rem;
    }
    .navbar .nav-link:hover { color: #fff; }
    .navbar .nav-link.active {
      color: #fff; font-weight: 600;
      background: rgba(255, 255, 255, 0.14);
    }

    .page-title {
      font-family: var(--display);
      font-weight: 700; letter-spacing: -0.02em; font-size: 1.65rem;
    }
    .page-sub { color: var(--ink-soft); font-size: 0.9rem; }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 0.875rem;
      box-shadow: 0 1px 2px rgba(34, 31, 26, 0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card.liftable:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(34, 31, 26, 0.08);
    }
    .card-title { font-weight: 600; font-size: 1rem; }

    .btn-accent {
      background: var(--accent); color: #fff; font-weight: 600;
      border-radius: 0.55rem;
      box-shadow: 0 1px 2px rgba(14, 128, 116, 0.3);
    }
    .btn-accent:hover {
      background: var(--accent-deep); color: #fff;
      box-shadow: 0 3px 10px rgba(14, 128, 116, 0.3);
    }
    .btn-quiet {
      --bs-btn-color: var(--ink-soft);
      --bs-btn-border-color: var(--card-border);
      --bs-btn-hover-color: var(--ink);
      --bs-btn-hover-bg: #efece6;
      --bs-btn-hover-border-color: var(--card-border);
      background: #fff;
      border-radius: 0.55rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.2rem rgba(14, 128, 116, 0.12);
    }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 0.25rem; }

    .badge-soft {
      font-weight: 600; font-size: 0.72rem;
      padding: 0.32em 0.7em; border-radius: 99px;
    }
    .badge-applied  { background: var(--blue-soft);   color: var(--blue); }
    .badge-rejected { background: var(--rose-soft);   color: var(--rose); }
    .badge-accepted { background: var(--green-soft);  color: var(--green); }
    .badge-easy     { background: var(--green-soft);  color: var(--green); }
    .badge-medium   { background: var(--amber-soft);  color: var(--amber); }
    .badge-hard     { background: var(--rose-soft);   color: var(--rose); }
    .badge-tag      { background: var(--amber-soft);  color: var(--amber); }
    .badge-pattern  { background: var(--violet-soft); color: var(--violet); }
    .badge-category { background: var(--blue-soft);   color: var(--blue); }

    .mono-link {
      font-family: var(--mono); font-size: 0.78rem;
      word-break: break-all; text-decoration: none;
    }
    .mono-link:hover { text-decoration: underline; }

    .meta { color: var(--ink-soft); font-size: 0.78rem; }
    .desc-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .notes-text { font-size: 0.875rem; color: #4a453d; white-space: pre-line; }

    .kanban-head {
      font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--ink-soft);
      display: flex; align-items: center; gap: 0.45rem;
    }
    .kanban-count {
      font-weight: 600; font-size: 0.72rem;
      background: #ecease4; color: var(--ink-soft);
      border-radius: 99px; padding: 0.1em 0.6em;
    }
    .col-dot {
      width: 0.55rem; height: 0.55rem; border-radius: 99px; display: inline-block;
    }
    .kanban-col {
      min-height: 8rem;
      border-radius: 0.875rem;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .kanban-col.drag-over {
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .app-card { cursor: grab; }
    .app-card.dragging { opacity: 0.45; cursor: grabbing; }
    .status-applied  { border-left: 3px solid var(--blue); }
    .status-rejected { border-left: 3px solid var(--rose); }
    .status-accepted { border-left: 3px solid var(--green); }

    .stat-card { overflow: hidden; position: relative; }
    .stat-card::before {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 4px;
      background: var(--stripe, var(--accent));
    }
    .stat-card .stat-num {
      font-family: var(--display);
      font-weight: 800; font-size: 2.1rem; letter-spacing: -0.03em;
    }
    .stat-card .stat-label { color: var(--ink-soft); font-size: 0.82rem; font-weight: 500; }
    .row > *:nth-child(1) .stat-card { animation: rise 0.3s ease 0.03s both; }
    .row > *:nth-child(2) .stat-card { animation: rise 0.3s ease 0.08s both; }
    .row > *:nth-child(3) .stat-card { animation: rise 0.3s ease 0.13s both; }
    .row > *:nth-child(4) .stat-card { animation: rise 0.3s ease 0.18s both; }

    .empty-note { color: var(--ink-soft); font-size: 0.875rem; padding: 1.5rem 0; }
    .btn-read {
      --bs-btn-color: var(--green);
      --bs-btn-bg: var(--green-soft);
      --bs-btn-border-color: transparent;
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-bg: var(--green);
      --bs-btn-hover-border-color: transparent;
      font-weight: 600;
      border-radius: 0.55rem;
    }
    .unread-dot {
      display: inline-block; width: 0.5rem; height: 0.5rem;
      border-radius: 99px; background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .modal-content {
      border: none; border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(34, 31, 26, 0.25);
    }
    .modal-header { border-bottom: 1px solid var(--card-border); }
    .modal-title { font-family: var(--display); font-weight: 700; letter-spacing: -0.01em; }
    .modal-footer { border-top: none; padding-top: 0; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-md sticky-top" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" href="/">LeeCode<span class="dot">.</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link{{if eq .Active "applications"}} active{{end}}" href="/applications">Applications</a></li>
        <li class="nav-item"><a class="nav-link{{if eq .Active "links"}} active{{end}}" href="/links">Links</a></li>
        <li class="nav-item"><a class="nav-link{{if eq .Active "algorithms"}} active{{end}}" href="/algorithms">Algorithms</a></li>
        <li class="nav-item"><a class="nav-link{{if eq .Active "behavioral"}} active{{end}}" href="/behavioral">Behavioral</a></li>
      </ul>
    </div>
  </div>
</nav>
<main class="container py-4 py-md-5">
{{template "content" .}}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Focus the first field when an add-dialog opens.
  document.addEventListener("shown.bs.modal", function (e) {
    var field = e.target.querySelector("input, textarea, select");
    if (field) field.focus();
  });
</script>
</body>
</html>
{{end}}
