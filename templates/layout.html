{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}LeeCode{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17150f;
      --surface: #faf8f2;
      --rule: #e5e0d4;
      --quiet: #756f63;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      --serif: "EB Garamond", Georgia, "Times New Roman", serif;
      --pixel: "Silkscreen", monospace;
      --sp-xs: 8px;
      --sp-sm: 24px;
      --sp-md: 40px;
      --sp-lg: 80px;
      /* default section accent: highlighter butter */
      --section: #f5e9c8;
      --section-deep: #17150f;
    }
    /* risograph ink set: pastel tint + deep companion for text on it */
    .t-sky    { --tint: #d9e7f4; --deep: #38597e; }
    .t-rose   { --tint: #f6dcda; --deep: #9c4540; }
    .t-mint   { --tint: #dcecdb; --deep: #41704c; }
    .t-butter { --tint: #f5e9c8; --deep: #7a5d18; }
    .t-lilac  { --tint: #e7e0f3; --deep: #5f4d8c; }
    .t-peach  { --tint: #f7dfcc; --deep: #8c4d22; }
    body.page-applications { --section: #d9e7f4; --section-deep: #38597e; }
    body.page-links        { --section: #f5e9c8; --section-deep: #7a5d18; }
    body.page-algorithms   { --section: #dcecdb; --section-deep: #41704c; }
    body.page-behavioral   { --section: #e7e0f3; --section-deep: #5f4d8c; }

    body {
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.6;
      background: var(--surface);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--section); color: var(--ink); }
    a { color: var(--ink); text-underline-offset: 2px; }
    a:hover { color: var(--ink); }

    @keyframes settle {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    /* ---- Masthead ---- */
    .masthead {
      background: var(--surface);
      border-bottom: 1px solid var(--ink);
      position: relative;
    }
    .masthead::after {
      /* the double rule under a print masthead */
      content: "";
      display: block;
      position: absolute;
      left: 0; right: 0; bottom: 3px;
      border-bottom: 1px solid var(--ink);
    }
    .masthead .inner {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--sp-xs) var(--sp-sm);
      padding: 18px 0 14px;
    }
    .brand {
      font-family: var(--pixel);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0;
      text-decoration: none;
      color: var(--ink);
    }
    .brand:hover { color: var(--ink); }
    .brand-meta {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--quiet);
      display: none;
    }
    @media (min-width: 768px) { .brand-meta { display: inline; } }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 18px;
      list-style: none;
      margin: 0; padding: 0;
    }
    .site-nav a {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.2;
      text-decoration: none;
      color: var(--ink);
      padding: 2px 6px 3px;
      margin: -2px -6px -3px;
      border-bottom: 1px solid transparent;
    }
    .site-nav a:hover { border-bottom-color: var(--deep, var(--rule)); }
    .site-nav a.active {
      /* highlighter swipe in the section's ink */
      background: var(--tint);
      border-bottom-color: var(--deep);
      margin: -2px 0 -3px;
    }
    .site-nav a.active::before { content: "■ "; font-size: 8px; vertical-align: 2px; color: var(--deep); }

    main { animation: settle 0.35s ease both; }
    .page-frame { max-width: 1080px; }

    /* ---- Page header, editorial style ---- */
    .page-head {
      position: relative;
      margin-bottom: var(--sp-md);
      padding-bottom: var(--sp-sm);
      border-bottom: 1px solid var(--rule);
    }
    .page-head::after {
      /* a short registration bar in the section ink, sitting on the rule */
      content: "";
      position: absolute;
      left: 0; bottom: -2px;
      width: 72px; height: 3px;
      background: var(--section-deep);
    }
    body.page-dashboard .page-head::after {
      width: 144px;
      background: linear-gradient(90deg, #38597e 0 25%, #7a5d18 0 50%, #41704c 0 75%, #5f4d8c 0);
    }
    .page-no {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--section-deep);
      margin-bottom: 4px;
    }
    .page-title {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 32px;
      line-height: 38px;
      letter-spacing: 0;
      margin: 0;
    }
    .page-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: 16px;
      color: var(--quiet);
      margin: 4px 0 0;
    }

    /* ---- Buttons ---- */
    .btn-ink, .btn-ghost {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.25;
      border-radius: 4px;
      padding: 8px 16px;
      min-width: 120px;
      min-height: 40px;
      box-shadow: none;
    }
    .btn-ink {
      background: var(--ink);
      color: var(--surface);
      border: 1px solid var(--ink);
    }
    .btn-ink:hover { background: var(--section); color: var(--ink); border-color: var(--ink); }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--ink);
    }
    .btn-ghost:hover { background: var(--ink); color: var(--surface); }
    .btn-ink:focus-visible, .btn-ghost:focus-visible,
    .btn-rule:focus-visible {
      outline: 1px solid var(--section-deep);
      outline-offset: 2px;
      box-shadow: none;
    }
    /* small quiet action: a text button with a hairline border */
    .btn-rule {
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.2;
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 4px 10px;
    }
    .btn-rule:hover { border-color: var(--section-deep); color: var(--ink); }
    .btn-rule.is-on {
      background: var(--section-deep);
      color: var(--surface);
      border-color: var(--section-deep);
    }

    /* ---- Chips / annotations ---- */
    .chip {
      font-family: var(--sans);
      font-size: 11px;
      line-height: 1.2;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--deep, var(--ink));
      background: var(--tint, transparent);
      border: 1px solid color-mix(in srgb, var(--deep, var(--ink)) 35%, transparent);
      border-radius: 2px;
      padding: 2px 7px 1px;
      white-space: nowrap;
    }
    .chip-solid {
      background: var(--deep, var(--ink));
      color: var(--surface);
      border-color: var(--deep, var(--ink));
    }
    .glyph { font-family: var(--sans); font-size: 10px; vertical-align: 1px; }

    .meta {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--quiet);
    }
    .mono-link {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--quiet);
      word-break: break-all;
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
    }
    .mono-link:hover { color: var(--section-deep); border-bottom-color: var(--section-deep); }

    /* ---- Cards: quiet containers ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
      box-shadow: none;
      transition: border-color 0.15s ease;
    }
    .card.liftable:hover { border-color: var(--deep, var(--section-deep)); }
    .card-title {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 17px;
      line-height: 1.3;
    }
    .notes-text {
      font-family: var(--serif);
      font-size: 14px;
      line-height: 22.4px;
      color: var(--ink);
      white-space: pre-line;
    }
    .desc-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty-note {
      font-family: var(--serif);
      font-style: italic;
      color: var(--quiet);
      font-size: 15px;
      padding: var(--sp-sm) 0;
    }

    /* ---- Forms ---- */
    .form-label {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .form-control, .form-select {
      font-family: var(--serif);
      font-size: 15px;
      background: #fffefb;
      border: 1px solid var(--rule);
      border-radius: 4px;
      color: var(--ink);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--section-deep);
      box-shadow: none;
      background: #fffefb;
    }
    .form-text { font-family: var(--serif); font-style: italic; color: var(--quiet); }

    /* ---- Kanban ---- */
    .kanban-head {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--deep, var(--ink));
      margin-bottom: var(--sp-sm);
    }
    .kanban-head .glyph { color: var(--deep, var(--ink)); }
    .kanban-count {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 12px;
      color: var(--quiet);
      margin-left: auto;
    }
    .kanban-col {
      min-height: 8rem;
      border-radius: 0;
      transition: outline-color 0.15s ease;
      outline: 1px dashed transparent;
      outline-offset: 6px;
    }
    .kanban-col.drag-over { outline-color: var(--deep, var(--ink)); }
    .app-card {
      cursor: grab;
      border-left: 3px solid var(--deep, var(--rule));
    }
    .app-card.dragging { opacity: 0.4; cursor: grabbing; }

    /* ---- Dashboard index ---- */
    .toc {
      border: 1px solid var(--ink);
      background: var(--ink);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
    }
    @media (min-width: 768px) { .toc { grid-template-columns: repeat(3, 1fr); } }
    .toc a { text-decoration: none; }
    .toc-cell {
      background: var(--tint, var(--surface));
      padding: var(--sp-sm) var(--sp-sm) 20px;
      height: 100%;
      transition: background 0.15s ease;
    }
    .toc a:hover .toc-cell { background: color-mix(in srgb, var(--tint, var(--surface)) 88%, var(--deep, var(--ink))); }
    .toc-fig {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--deep, var(--quiet));
      margin-bottom: var(--sp-xs);
    }
    .toc-num {
      font-family: var(--pixel);
      font-weight: 400;
      font-size: 34px;
      line-height: 1.1;
      color: var(--ink);
    }
    .toc-num .denom { font-size: 16px; color: var(--deep, var(--quiet)); }
    .toc-label {
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
      color: var(--ink);
      margin-top: 2px;
    }
    .toc a:nth-child(1) .toc-cell { animation: settle 0.3s ease 0.02s both; }
    .toc a:nth-child(2) .toc-cell { animation: settle 0.3s ease 0.06s both; }
    .toc a:nth-child(3) .toc-cell { animation: settle 0.3s ease 0.10s both; }
    .toc a:nth-child(4) .toc-cell { animation: settle 0.3s ease 0.14s both; }
    .toc a:nth-child(5) .toc-cell { animation: settle 0.3s ease 0.18s both; }
    .toc a:nth-child(6) .toc-cell { animation: settle 0.3s ease 0.22s both; }

    /* ---- Misc ---- */
    .unread-mark {
      font-family: var(--sans);
      font-size: 9px;
      flex-shrink: 0;
      line-height: 1;
      color: var(--section-deep);
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--ink);
      border-radius: 8px;
      box-shadow: none;
    }
    .modal-header {
      background: color-mix(in srgb, var(--section) 50%, var(--surface));
      border-bottom: 1px solid var(--rule);
      border-radius: 7px 7px 0 0;
    }
    .modal-title {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0;
    }
    .modal-footer { border-top: none; padding-top: 0; }
    .btn-close { filter: grayscale(1); }

    .colophon {
      border-top: 1px solid var(--rule);
      margin-top: var(--sp-lg);
      padding: var(--sp-sm) 0 var(--sp-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--sp-sm);
      font-family: var(--sans);
      font-size: 12px;
      color: var(--quiet);
    }
    .colophon .pixel { font-family: var(--pixel); font-size: 11px; color: var(--ink); }
    .regmarks { display: inline-flex; gap: 4px; }
    .regmarks i {
      width: 10px; height: 10px;
      background: var(--tint);
      border: 1px solid var(--deep);
    }

    @media (max-width: 767.98px) {
      .page-title { font-size: 26px; line-height: 31px; }
      .toc-num { font-size: 26px; }
    }
  </style>
</head>
<body class="page-{{.Active}}">
<header class="masthead">
  <div class="container page-frame">
    <div class="inner">
      <div class="d-flex align-items-baseline gap-3">
        <a class="brand" href="/">LEECODE</a>
        <span class="brand-meta">a field manual for the job hunt</span>
      </div>
      <ul class="site-nav">
        <li><a class="t-sky{{if eq .Active "applications"}} active{{end}}" href="/applications">Applications</a></li>
        <li><a class="t-butter{{if eq .Active "links"}} active{{end}}" href="/links">Links</a></li>
        <li><a class="t-mint{{if eq .Active "algorithms"}} active{{end}}" href="/algorithms">Algorithms</a></li>
        <li><a class="t-lilac{{if eq .Active "behavioral"}} active{{end}}" href="/behavioral">Behavioral</a></li>
      </ul>
    </div>
  </div>
</header>
<main class="container page-frame py-4 py-md-5">
{{template "content" .}}
<footer class="colophon">
  <span class="pixel">LEECODE</span>
  <span class="d-none d-sm-inline">set in EB Garamond &amp; system sans · printed in six pastel inks</span>
  <span class="regmarks" aria-hidden="true">
    <i class="t-sky"></i><i class="t-rose"></i><i class="t-mint"></i><i class="t-butter"></i><i class="t-lilac"></i><i class="t-peach"></i>
  </span>
</footer>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Focus the first field when an add-dialog opens.
  document.addEventListener("shown.bs.modal", function (e) {
    var field = e.target.querySelector("input, textarea, select");
    if (field) field.focus();
  });
</script>
</body>
</html>
{{end}}
