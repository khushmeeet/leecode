{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}LeeCode{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* grayscale structure */
      --bg: #ffffff;
      --surface: #f5f5f6;
      --surface-2: #ededf0;
      --border: #e5e5e8;
      --border-strong: #d6d6da;
      --text: #1b1b1f;
      --muted: #6c6c75;
      --subtle: #9b9ba3;

      /* meaning: status palette + difficulty. soft mid-tones, never neon. */
      --green: #1f9d5b;        /* Accepted · Easy · the one accent */
      --green-ink: #167a47;    /* solid primary fill (white text) */
      --green-ink-h: #116239;
      --blue: #3b76c9;         /* Applied */
      --red: #d2544b;          /* Rejected · Hard */
      --amber: #b9821f;        /* Medium */

      --green-tint: #e7f5ee;
      --blue-tint: #eaf1fb;
      --red-tint: #fbeae8;
      --amber-tint: #f6eedb;

      --font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --pixel: "Silkscreen", monospace;

      --sp-1: 8px;
      --sp-2: 16px;
      --sp-3: 24px;
      --sp-4: 40px;
      --sp-5: 64px;
      --radius: 8px;
      --frame: 1080px;
    }

    /* status helpers — set --status; borders, underlines and counts read it */
    .s-applied  { --status: var(--blue); }
    .s-rejected { --status: var(--red); }
    .s-accepted { --status: var(--green); }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: var(--green-tint); color: var(--text); }
    a { color: var(--text); text-underline-offset: 2px; }
    a:hover { color: var(--text); }

    :focus-visible {
      outline: 2px solid color-mix(in srgb, var(--green) 55%, transparent);
      outline-offset: 2px;
    }

    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    .frame { max-width: var(--frame); }

    /* ---- Navbar ---- */
    .nav-bar { border-bottom: 1px solid var(--border); background: var(--bg); }
    .nav-bar .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
      min-height: 60px;
      padding: 8px 0;
    }
    .brand {
      font-family: var(--pixel);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }
    .brand:hover { color: var(--text); }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .site-nav a {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 6px 6px 0 0;
      border-bottom: 2px solid transparent;
      transition: color .12s ease, background .12s ease;
    }
    .site-nav a:hover { color: var(--text); background: var(--surface); }
    .site-nav a.active {
      color: var(--text);
      font-weight: 600;
      border-bottom-color: var(--green);
    }

    /* main is intentionally not animated: it is the modals' ancestor, and any
       transform (containing block) or opacity (stacking context) on it would
       break the position:fixed modal overlay. Entrance motion lives on the
       dashboard stat cards, which are never modal ancestors. */

    /* ---- Page head ---- */
    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
      padding-bottom: var(--sp-3);
      border-bottom: 1px solid var(--border);
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.15;
      margin: 0;
      color: var(--text);
    }
    .page-sub {
      font-size: 15px;
      color: var(--muted);
      margin: 6px 0 0;
    }

    /* ---- Buttons ---- */
    .btn { font-family: var(--font); }
    .btn-ink, .btn-ghost {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
      border-radius: 7px;
      padding: 9px 16px;
      min-height: 40px;
      box-shadow: none;
      transition: background .12s ease, border-color .12s ease;
    }
    .btn-ink { background: var(--green-ink); color: #fff; border: 1px solid var(--green-ink); }
    .btn-ink:hover { background: var(--green-ink-h); border-color: var(--green-ink-h); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
    .btn-ghost:hover { background: var(--surface); color: var(--text); }

    /* small quiet action: hairline text button */
    .btn-rule {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.2;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 11px;
      box-shadow: none;
      transition: color .12s ease, border-color .12s ease, background .12s ease;
    }
    .btn-rule:hover { color: var(--text); border-color: var(--subtle); background: var(--surface); }
    .btn-rule.is-on { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-ink:focus-visible, .btn-ghost:focus-visible, .btn-rule:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--green) 55%, transparent);
      outline-offset: 2px;
      box-shadow: none;
    }

    /* ---- Cards: light-gray surfaces ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: none;
      transition: border-color .12s ease, background .12s ease;
    }
    .card.liftable:hover { border-color: var(--border-strong); background: var(--surface-2); }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.35; color: var(--text); }
    .notes-text { font-size: 13.5px; line-height: 1.6; color: var(--muted); white-space: pre-line; }

    /* ---- Rendered markdown (notes) ---- */
    .md { font-size: 13.5px; line-height: 1.6; color: var(--muted); }
    .md > :first-child { margin-top: 0; }
    .md > :last-child { margin-bottom: 0; }
    .md h1, .md h2, .md h3, .md h4 {
      color: var(--text);
      font-weight: 600;
      line-height: 1.3;
      margin: 1.1em 0 .4em;
    }
    .md h1 { font-size: 17px; }
    .md h2 { font-size: 15px; }
    .md h3 { font-size: 14px; }
    .md h4 { font-size: 13.5px; }
    .md p { margin: 0 0 .7em; }
    .md ul, .md ol { margin: 0 0 .7em; padding-left: 1.4em; }
    .md li { margin: .15em 0; }
    .md li > ul, .md li > ol { margin: .15em 0; }
    .md a { color: var(--green-ink); text-decoration: underline; }
    .md a:hover { color: var(--green-ink-h); }
    .md code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .9em;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .05em .35em;
    }
    .md pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0 0 .7em;
    }
    .md pre code { background: none; border: 0; padding: 0; font-size: 12.5px; }
    .md blockquote {
      margin: 0 0 .7em;
      padding: .1em 0 .1em .9em;
      border-left: 3px solid var(--border-strong);
      color: var(--subtle);
    }
    .md hr { border: 0; border-top: 1px solid var(--border); margin: 1em 0; }
    .md table { border-collapse: collapse; margin: 0 0 .7em; font-size: 13px; }
    .md th, .md td { border: 1px solid var(--border); padding: 4px 9px; text-align: left; }
    .md th { background: var(--surface-2); font-weight: 600; color: var(--text); }
    .md img { max-width: 100%; height: auto; }
    .desc-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta { font-size: 12px; color: var(--subtle); }
    .mono-link {
      font-size: 12.5px;
      color: var(--muted);
      word-break: break-all;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .mono-link:hover { color: var(--text); border-bottom-color: var(--subtle); }
    .empty-note { font-size: 14px; color: var(--subtle); padding: var(--sp-3) 0; }

    /* ---- Chips / badges ---- */
    .chip {
      display: inline-block;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 8px;
      white-space: nowrap;
    }
    /* difficulty: the only chips that carry color */
    .chip--easy   { color: #15724a; background: var(--green-tint); border-color: transparent; }
    .chip--medium { color: #8a6112; background: var(--amber-tint); border-color: transparent; }
    .chip--hard   { color: #b23f36; background: var(--red-tint);   border-color: transparent; }

    /* read/unread dot */
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .dot--unread { background: var(--green); }
    .dot--read { background: var(--border-strong); }

    /* ---- Forms ---- */
    .form-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text);
      margin-bottom: 5px;
    }
    .form-control, .form-select {
      font-family: var(--font);
      font-size: 14px;
      background-color: #fff;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 11px;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 18%, transparent);
      background-color: #fff;
    }
    .form-control::placeholder { color: var(--subtle); }
    .form-text { font-family: var(--font); font-style: normal; font-size: 12px; color: var(--subtle); }
    .form-select-sm, .form-control-sm { font-size: 13px; padding: 5px 9px; }
    /* the padding shorthand above wipes Bootstrap's reserved space for the
       caret; selects need explicit room on the right so the arrow never
       overlaps the text (most visible on a narrow, single-option select). */
    .form-select { padding-right: 34px; }
    .form-select-sm { padding-right: 30px; }

    /* ---- Kanban ---- */
    .col-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 8px;
      margin-bottom: var(--sp-3);
      border-bottom: 2px solid var(--status, var(--border-strong));
    }
    .col-head__label { font-size: 14px; font-weight: 600; color: var(--text); }
    .col-head__count { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--status, var(--muted)); }
    .kanban-col {
      min-height: 6rem;
      border-radius: 8px;
      outline: 2px dashed transparent;
      outline-offset: 6px;
      transition: outline-color .12s ease;
    }
    .kanban-col.drag-over { outline-color: var(--status, var(--border-strong)); }
    .app-card { cursor: grab; border-left: 3px solid var(--status, var(--border-strong)); }
    .app-card.dragging { opacity: .4; cursor: grabbing; }

    /* ---- Dashboard ---- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-2);
    }
    @media (min-width: 768px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--status, var(--border));
      border-radius: var(--radius);
      padding: var(--sp-3);
      display: block;
      text-decoration: none;
      color: var(--text);
      transition: border-color .12s ease, background .12s ease;
      animation: rise .3s ease both;
    }
    .stat:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .stat:hover { border-left-color: var(--status, var(--border-strong)); }
    .stat__label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .stat__num { font-size: 34px; font-weight: 700; line-height: 1.1; margin-top: 6px; letter-spacing: -0.02em; }
    .stat__num .denom { font-size: 16px; font-weight: 500; color: var(--subtle); }
    .stat__hint { font-size: 12.5px; color: var(--subtle); margin-top: 2px; }
    .stat:nth-child(1) { animation-delay: .02s; }
    .stat:nth-child(2) { animation-delay: .05s; }
    .stat:nth-child(3) { animation-delay: .08s; }
    .stat:nth-child(4) { animation-delay: .11s; }
    .stat:nth-child(5) { animation-delay: .14s; }
    .stat:nth-child(6) { animation-delay: .17s; }

    /* ---- Modal ---- */
    .modal-content {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      box-shadow: 0 20px 50px -20px rgba(0, 0, 0, .25);
    }
    .modal-header {
      background: transparent;
      border-bottom: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      padding: 18px 20px;
    }
    .modal-title { font-family: var(--font); font-size: 16px; font-weight: 600; color: var(--text); }
    .modal-body { padding: 20px; }
    .modal-footer { border-top: 1px solid var(--border); padding: 16px 20px; gap: 8px; }
    .btn-close { filter: none; }

    @media (max-width: 767.98px) {
      .page-title { font-size: 24px; }
      .stat__num { font-size: 28px; }
    }
  </style>
</head>
<body class="page-{{.Active}}">
<header class="nav-bar">
  <div class="container frame">
    <div class="inner">
      <a class="brand" href="/">LEECODE</a>
      <ul class="site-nav">
        <li><a class="{{if eq .Active "applications"}}active{{end}}" href="/applications">Applications</a></li>
        <li><a class="{{if eq .Active "links"}}active{{end}}" href="/links">Links</a></li>
        <li><a class="{{if eq .Active "algorithms"}}active{{end}}" href="/algorithms">Notes</a></li>
        <li><a class="{{if eq .Active "behavioral"}}active{{end}}" href="/behavioral">Behavioral</a></li>
      </ul>
    </div>
  </div>
</header>
<main class="container frame py-4 py-md-5">
{{template "content" .}}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Focus the first field when an add-dialog opens.
  document.addEventListener("shown.bs.modal", function (e) {
    var field = e.target.querySelector("input, textarea, select");
    if (field) field.focus();
  });
</script>
</body>
</html>
{{end}}
